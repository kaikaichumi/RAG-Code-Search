project:
  root_path: "F:/coding/assistant"
  exclude_dirs:
    - ".metadata"
    - ".git"
    - "node_modules"
    - "venv"
    - "__pycache__"
    - "dist"
    - "build"
    - "target"
  file_extensions:
    - ".java"
    - ".py"
    - ".js"
    - ".ts"
    - ".jsx"
    - ".tsx"
    - ".cpp"
    - ".c"
    - ".h"
    - ".go"
    - ".rs"
    - ".jsp"
    - ".xml"
    - ".properties"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".md"
    - ".txt"
    - ".csv"
    - ".css"
    - ".scss"
    - ".sql"

embedding:
  model: "qwen3-embedding:0.6b"
  base_url: "http://localhost:11434"

llm:
  base_url: "http://127.0.0.1:8000/v1"
  api_key: "not-needed"
  model: "Qwen3.5-9B-UD-Q4_K_XL.gguf"
  temperature: 0.1
  max_tokens: 2048

vectorstore:
  persist_directory: "./chroma_db"
  search_top_k: 6

chunking:
  chunk_size: 1500
  chunk_overlap: 300

web_ui:
  host: "0.0.0.0"
  port: 7861
  share: false



